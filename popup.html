<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Account Switcher</title>
  <style>
    :root {
      --bg-primary: #1e1f22;
      --bg-secondary: #2b2d31;
      --bg-tertiary: #313338;
      --text-normal: #dbdee1;
      --text-muted: #949ba4;
      --brand: #5865f2;
      --brand-hover: #4752c4;
      --danger: #f23f43;
      --danger-hover: #c93337;
      --success: #23a55a;
      --border: #3f4147;
      --font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-primary);
      color: var(--text-normal);
      width: 350px;
      padding: 16px;
      font-size: 14px;
      overflow-x: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title svg {
      color: var(--brand);
    }

    .account-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 240px;
      overflow-y: auto;
      margin-bottom: 16px;
      padding-right: 4px;
    }

    .account-list::-webkit-scrollbar {
      width: 6px;
    }
    .account-list::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }
    .account-list::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 3px;
    }

    .account-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s, transform 0.1s;
    }

    .account-card:hover {
      border-color: var(--brand);
      transform: translateY(-1px);
    }

    .account-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-width: 70%;
    }

    .account-name {
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .account-token-preview {
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
    }

    .account-actions {
      display: flex;
      gap: 6px;
    }

    button {
      font-family: var(--font-family);
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-login {
      background-color: var(--brand);
      color: #fff;
      padding: 6px 12px;
    }

    .btn-login:hover {
      background-color: var(--brand-hover);
    }

    .btn-delete {
      background-color: transparent;
      color: var(--text-muted);
      padding: 6px;
      border-radius: 4px;
    }

    .btn-delete:hover {
      background-color: var(--bg-tertiary);
      color: var(--danger);
    }

    .add-account-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .form-title {
      font-weight: 600;
      color: #fff;
      font-size: 13px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    input {
      background-color: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-normal);
      padding: 8px 10px;
      border-radius: 4px;
      font-family: var(--font-family);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--brand);
    }

    .btn-submit {
      background-color: var(--success);
      color: #fff;
      padding: 8px;
      font-weight: 600;
      margin-top: 4px;
    }

    .btn-submit:hover {
      background-color: #1a7f45;
    }

    .empty-state {
      text-align: center;
      padding: 24px 8px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .message {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 12px;
      display: none;
    }

    .message.error {
      background-color: rgba(242, 63, 67, 0.1);
      color: var(--danger);
      border: 1px solid var(--danger);
      display: block;
    }

    .message.success {
      background-color: rgba(35, 165, 90, 0.1);
      color: var(--success);
      border: 1px solid var(--success);
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">
      <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="currentColor">
        <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a77.7,77.7,0,0,0,6.63-10.85,68.43,68.43,0,0,1-10.5-5c.87-.64,1.71-1.32,2.51-2a75.78,75.78,0,0,0,73.1,0c.8,0.7,1.64,1.38,2.51,2a68.43,68.43,0,0,1-10.5,5,77.7,77.7,0,0,0,6.63,10.85,105.73,105.73,0,0,0,31-18.83C129.81,49.2,123.63,26.47,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
      </svg>
      Token Switcher
    </div>
  </div>

  <div id="msgBox" class="message"></div>

  <div class="account-list" id="accountList">
    <div class="empty-state">No accounts saved yet. Add one below!</div>
  </div>

  <div class="add-account-form">
    <div class="form-title">Add Discord Account</div>
    <div class="input-group">
      <label for="accToken">Discord Token</label>
      <input type="password" id="accToken" placeholder="Paste your token here" required />
    </div>
    <button class="btn-submit" id="btnAdd">Add Account</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
